<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>50분 집중하냥</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #ffffff;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #111;
    }

    .app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px 6px;
      flex-shrink: 0;
    }

    .app-title {
      font-size: 17px;
      font-weight: 600;
      color: #111;
      letter-spacing: -0.3px;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: #111;
      display: flex;
      align-items: center;
      border-radius: 8px;
      transition: opacity 0.2s;
    }
    .icon-btn:active { opacity: 0.5; }

    /* ── CAT CAROUSEL ── */
    .cat-carousel {
      width: 100%;
      height: 145px;
      position: relative;
      overflow: hidden;
      background: #f2f2f2;
      flex-shrink: 0;
    }

    .cat-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.9s ease;
    }
    .cat-img.active { opacity: 1; }

    .carousel-dots {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
      z-index: 2;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(0,0,0,0.22);
      transition: background 0.3s;
    }
    .dot.active { background: rgba(0,0,0,0.6); }

    /* ── FOCUS MESSAGE ── */
    .focus-msg {
      text-align: center;
      font-size: 13px;
      color: #999;
      padding: 9px 0 4px;
      flex-shrink: 0;
      letter-spacing: 0.2px;
    }

    /* ── TIMER AREA ── */
    .timer-area {
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 1;
      min-height: 0;
    }

    .timer-wrapper {
      position: relative;
      width: 210px;
      height: 210px;
      cursor: ns-resize;
      user-select: none;
      touch-action: none;
      flex-shrink: 0;
    }

    .timer-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
      overflow: visible;
    }

    /* Outer thin ring */
    .ring-outer {
      fill: none;
      stroke: rgba(0,0,0,0.1);
      stroke-width: 1.2;
    }

    /* Inner thick ring — background (remaining) */
    .ring-bg {
      fill: none;
      stroke: rgba(0,0,0,0.13);
      stroke-width: 20;
    }

    /* Inner thick ring — progress (elapsed, dark) */
    .ring-progress {
      fill: none;
      stroke: rgba(0,0,0,0.8);
      stroke-width: 20;
      stroke-linecap: butt;
      transition: stroke-dashoffset 0.08s linear;
    }

    .timer-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }

    .time-main {
      font-size: 34px;
      font-weight: 200;
      letter-spacing: 2px;
      color: #111;
      line-height: 1;
    }

    .time-ms {
      font-size: 13px;
      color: #bbb;
      margin-top: 5px;
      letter-spacing: 1px;
    }

    .time-hint {
      font-size: 9px;
      color: #d0d0d0;
      margin-top: 7px;
      letter-spacing: 0.2px;
    }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 44px;
      padding: 6px 0 4px;
      flex-shrink: 0;
    }

    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      padding: 10px;
      border-radius: 50%;
      transition: opacity 0.2s;
    }
    .ctrl-btn:active { opacity: 0.4; }

    .play-btn {
      width: 62px;
      height: 62px;
      background: #111;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      transition: transform 0.15s, opacity 0.2s;
      flex-shrink: 0;
    }
    .play-btn:active { transform: scale(0.93); opacity: 0.85; }

    /* ── SESSION LABEL ── */
    .session-label {
      text-align: center;
      font-size: 11px;
      color: #c8c8c8;
      padding: 2px 0 9px;
      flex-shrink: 0;
      letter-spacing: 0.3px;
    }

    /* ── PRESETS ── */
    .presets {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 0 16px 16px;
      flex-shrink: 0;
    }

    .preset-btn {
      flex: 1;
      padding: 9px 2px;
      border-radius: 24px;
      border: 1.5px solid #e0e0e0;
      background: #fff;
      font-size: 11px;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.18s;
      letter-spacing: -0.2px;
    }
    .preset-btn:active { transform: scale(0.95); }
    .preset-btn.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    /* ── HISTORY PANEL ── */
    .history-panel {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 200;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      max-width: 430px;
      left: 50%;
      translate: -50% 0;
    }
    .history-panel.open { transform: translateX(0); }

    .history-header {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid #f0f0f0;
      flex-shrink: 0;
    }

    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #111;
      padding: 4px;
      margin-right: 12px;
      display: flex;
      align-items: center;
      transition: opacity 0.2s;
    }
    .back-btn:active { opacity: 0.4; }

    .history-title {
      font-size: 17px;
      font-weight: 600;
    }

    .history-stats {
      padding: 16px 20px;
      border-bottom: 1px solid #f5f5f5;
      flex-shrink: 0;
    }

    .stats-title {
      font-size: 11px;
      color: #aaa;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .stat-row {
      display: flex;
      gap: 12px;
    }

    .stat-card {
      flex: 1;
      background: #f8f8f8;
      border-radius: 14px;
      padding: 12px 10px;
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 600;
      color: #111;
      line-height: 1;
    }

    .stat-label {
      font-size: 10px;
      color: #aaa;
      margin-top: 4px;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      -webkit-overflow-scrolling: touch;
    }

    .empty-history {
      text-align: center;
      padding: 40px 20px;
      color: #bbb;
      font-size: 13px;
      line-height: 1.7;
    }

    .history-date-group { margin-bottom: 20px; }

    .history-date {
      font-size: 11px;
      color: #bbb;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f5f5f5;
    }

    .history-item-left { display: flex; flex-direction: column; gap: 2px; }

    .history-time-label {
      font-size: 12px;
      color: #888;
    }

    .history-target {
      font-size: 10px;
      color: #ccc;
    }

    .history-duration {
      font-size: 16px;
      font-weight: 500;
      color: #111;
    }

    /* ── CUSTOM TIME PANEL ── */
    .custom-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 300;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .custom-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .custom-sheet {
      background: #fff;
      border-radius: 24px 24px 0 0;
      padding: 28px 24px 36px;
      width: 100%;
      max-width: 430px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .custom-overlay.open .custom-sheet { transform: translateY(0); }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .custom-title {
      font-size: 17px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 24px;
    }

    .time-picker {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .time-spinner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .spinner-input {
      width: 80px;
      height: 56px;
      border: 1.5px solid #e0e0e0;
      border-radius: 14px;
      font-size: 28px;
      font-weight: 300;
      text-align: center;
      font-family: inherit;
      color: #111;
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }
    .spinner-input::-webkit-inner-spin-button,
    .spinner-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .spinner-input:focus { border-color: #111; }

    .spinner-label {
      font-size: 11px;
      color: #aaa;
      font-weight: 500;
    }

    .time-colon {
      font-size: 28px;
      color: #ccc;
      font-weight: 200;
      margin-bottom: 20px;
    }

    .custom-confirm {
      width: 100%;
      padding: 16px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    .custom-confirm:active { opacity: 0.8; }

    .custom-cancel {
      width: 100%;
      padding: 12px;
      background: none;
      color: #aaa;
      border: none;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      margin-top: 6px;
    }

    /* ── DONE FLASH ── */
    @keyframes doneFlash {
      0%, 100% { background: #fff; }
      30% { background: #f0f0f0; }
    }
    .done-flash { animation: doneFlash 0.6s ease 2; }
  </style>
</head>
<body>
<div class="app" id="app">

  <!-- Header -->
  <div class="header">
    <span class="app-title">50분 집중하냥</span>
    <button class="icon-btn" id="historyBtn" aria-label="히스토리">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
    </button>
  </div>

  <!-- Cat Carousel -->
  <div class="cat-carousel" id="carousel">
    <div class="carousel-dots" id="dots"></div>
  </div>

  <!-- Focus Message -->
  <div class="focus-msg">집중하고 있냥~</div>

  <!-- Timer -->
  <div class="timer-area">
    <div class="timer-wrapper" id="timerWrapper">
      <svg class="timer-svg" viewBox="0 0 210 210" id="timerSvg">
        <!-- Outer thin ring -->
        <circle class="ring-outer" cx="105" cy="105" r="102"/>
        <!-- Inner thick ring — background -->
        <circle class="ring-bg" cx="105" cy="105" r="86"/>
        <!-- Inner thick ring — progress (elapsed, dark) -->
        <circle class="ring-progress" id="ringProgress" cx="105" cy="105" r="86"/>
      </svg>
      <div class="timer-display">
        <div class="time-main" id="timeMain">50:00</div>
        <div class="time-ms" id="timeMs">:00</div>
        <div class="time-hint">위아래 드래그로 시간 조절</div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="ctrl-btn" id="soundBtn" aria-label="고양이 소리">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
    </button>

    <button class="play-btn" id="playBtn" aria-label="재생/일시정지">
      <svg id="playIcon" width="22" height="22" viewBox="0 0 24 24" fill="white">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
    </button>

    <button class="ctrl-btn" id="resetBtn" aria-label="리셋">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
    </button>
  </div>

  <!-- Session Label -->
  <div class="session-label">오늘도 즐겁냥</div>

  <!-- Presets -->
  <div class="presets">
    <button class="preset-btn" data-minutes="10">10분</button>
    <button class="preset-btn" data-minutes="30">30분</button>
    <button class="preset-btn active" data-minutes="50">50분</button>
    <button class="preset-btn" data-minutes="custom">내마음이냥</button>
  </div>
</div>

<!-- History Panel -->
<div class="history-panel" id="historyPanel">
  <div class="history-header">
    <button class="back-btn" id="closeHistoryBtn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </button>
    <span class="history-title">집중 히스토리</span>
  </div>
  <div class="history-stats" id="historyStats"></div>
  <div class="history-list" id="historyList"></div>
</div>

<!-- Custom Time Sheet -->
<div class="custom-overlay" id="customOverlay">
  <div class="custom-sheet">
    <div class="sheet-handle"></div>
    <div class="custom-title">내마음이냥 ⏱</div>
    <div class="time-picker">
      <div class="time-spinner">
        <input type="number" class="spinner-input" id="customMin" min="0" max="99" value="50">
        <span class="spinner-label">분</span>
      </div>
      <span class="time-colon">:</span>
      <div class="time-spinner">
        <input type="number" class="spinner-input" id="customSec" min="0" max="59" value="0">
        <span class="spinner-label">초</span>
      </div>
    </div>
    <button class="custom-confirm" id="customConfirm">설정하냥!</button>
    <button class="custom-cancel" id="customCancel">취소</button>
  </div>
</div>

<script>
  /* ─────────────────────────────────────────
     CAT IMAGES
  ───────────────────────────────────────── */
  const CAT_IMAGES = [
    'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=700&h=300&fit=crop&auto=format&q=80',
    'https://images.unsplash.com/photo-1573865526739-10659fec78a5?w=700&h=300&fit=crop&auto=format&q=80',
    'https://images.unsplash.com/photo-1574158622682-e40e69881006?w=700&h=300&fit=crop&auto=format&q=80',
    'https://images.unsplash.com/photo-1518791841217-8f162f1912da?w=700&h=300&fit=crop&auto=format&q=80',
    'https://images.unsplash.com/photo-1533738363-b7f9aef128ce?w=700&h=300&fit=crop&auto=format&q=80',
    'https://images.unsplash.com/photo-1495360010541-f48722b34f7d?w=700&h=300&fit=crop&auto=format&q=80',
    'https://images.unsplash.com/photo-1561948955-570b270e7c36?w=700&h=300&fit=crop&auto=format&q=80',
    'https://images.unsplash.com/photo-1592194996308-7b43878e84a6?w=700&h=300&fit=crop&auto=format&q=80',
    'https://images.unsplash.com/photo-1548247416-ec66f4900b2e?w=700&h=300&fit=crop&auto=format&q=80',
    'https://images.unsplash.com/photo-1596854407944-bf87f6fdd49e?w=700&h=300&fit=crop&auto=format&q=80',
  ];

  const carousel = document.getElementById('carousel');
  const dotsEl   = document.getElementById('dots');
  let currentCat = 0;

  CAT_IMAGES.forEach((src, i) => {
    const img = document.createElement('img');
    img.className = 'cat-img' + (i === 0 ? ' active' : '');
    img.src = src;
    img.alt = '귀여운 냥이';
    img.draggable = false;
    carousel.insertBefore(img, dotsEl);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsEl.appendChild(dot);
  });

  function nextCat() {
    const imgs = carousel.querySelectorAll('.cat-img');
    const dots = dotsEl.querySelectorAll('.dot');
    imgs[currentCat].classList.remove('active');
    dots[currentCat].classList.remove('active');
    let next;
    do { next = Math.floor(Math.random() * CAT_IMAGES.length); } while (next === currentCat);
    currentCat = next;
    imgs[currentCat].classList.add('active');
    dots[currentCat].classList.add('active');
  }
  setInterval(nextCat, 3000);

  /* ─────────────────────────────────────────
     TIMER STATE
  ───────────────────────────────────────── */
  let totalMs     = 50 * 60 * 1000;
  let remainingMs = totalMs;
  let isRunning   = false;
  let lastTs      = null;
  let raf         = null;

  /* SVG ring setup */
  const R          = 86;
  const CIRCUM     = 2 * Math.PI * R;
  const ringEl     = document.getElementById('ringProgress');
  ringEl.style.strokeDasharray  = CIRCUM;
  ringEl.style.strokeDashoffset = CIRCUM; // 0% elapsed at start

  function updateRing() {
    const elapsed  = totalMs - remainingMs;
    const progress = Math.max(0, Math.min(1, elapsed / totalMs));
    ringEl.style.strokeDashoffset = CIRCUM * (1 - progress);
  }

  /* Display */
  const timeMainEl = document.getElementById('timeMain');
  const timeMsEl   = document.getElementById('timeMs');

  function render() {
    const tot  = Math.max(0, remainingMs);
    const m    = Math.floor(tot / 60000);
    const s    = Math.floor((tot % 60000) / 1000);
    const cs   = Math.floor((tot % 1000) / 10);
    timeMainEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    timeMsEl.textContent   = `:${String(cs).padStart(2,'0')}`;
    updateRing();
  }
  render();

  /* RAF loop */
  function tick(ts) {
    if (!lastTs) lastTs = ts;
    const delta = ts - lastTs;
    lastTs = ts;
    remainingMs = Math.max(0, remainingMs - delta);
    render();

    if (remainingMs <= 0) {
      isRunning = false;
      setPlayIcon(false);
      saveSession();
      playCatSound();
      document.getElementById('app').classList.add('done-flash');
      setTimeout(() => document.getElementById('app').classList.remove('done-flash'), 1400);
      return;
    }
    raf = requestAnimationFrame(tick);
  }

  /* ─────────────────────────────────────────
     CONTROLS
  ───────────────────────────────────────── */
  const playBtn  = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');

  function setPlayIcon(playing) {
    playIcon.innerHTML = playing
      ? '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>'
      : '<polygon points="5 3 19 12 5 21 5 3"/>';
  }

  playBtn.addEventListener('click', () => {
    if (remainingMs <= 0) return;
    isRunning = !isRunning;
    setPlayIcon(isRunning);
    if (isRunning) {
      lastTs = null;
      raf = requestAnimationFrame(tick);
    } else {
      cancelAnimationFrame(raf);
    }
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    if (isRunning) {
      isRunning = false;
      setPlayIcon(false);
      cancelAnimationFrame(raf);
    }
    remainingMs = totalMs;
    lastTs = null;
    render();
  });

  /* ─────────────────────────────────────────
     CAT SOUND (Web Audio API)
  ───────────────────────────────────────── */
  function playCatSound() {
    try {
      const ctx  = new (window.AudioContext || window.webkitAudioContext)();
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      const filt = ctx.createBiquadFilter();

      osc.type    = 'sawtooth';
      filt.type   = 'bandpass';
      filt.Q.value = 3;

      osc.connect(filt);
      filt.connect(gain);
      gain.connect(ctx.destination);

      const t = ctx.currentTime;

      /* Pitch: meow contour */
      osc.frequency.setValueAtTime(380, t);
      osc.frequency.exponentialRampToValueAtTime(780, t + 0.12);
      osc.frequency.exponentialRampToValueAtTime(580, t + 0.4);
      osc.frequency.exponentialRampToValueAtTime(360, t + 0.9);

      /* Filter sweep for vowel character */
      filt.frequency.setValueAtTime(600, t);
      filt.frequency.exponentialRampToValueAtTime(2200, t + 0.12);
      filt.frequency.exponentialRampToValueAtTime(1000, t + 0.5);
      filt.frequency.exponentialRampToValueAtTime(600, t + 0.9);

      /* Volume envelope */
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.35, t + 0.07);
      gain.gain.setValueAtTime(0.35, t + 0.15);
      gain.gain.linearRampToValueAtTime(0.18, t + 0.6);
      gain.gain.linearRampToValueAtTime(0, t + 1.0);

      osc.start(t);
      osc.stop(t + 1.05);
      setTimeout(() => ctx.close(), 1500);
    } catch (e) { /* audio not available */ }
  }

  document.getElementById('soundBtn').addEventListener('click', playCatSound);

  /* ─────────────────────────────────────────
     DRAG ON RING TO ADJUST TIME
  ───────────────────────────────────────── */
  const timerWrapper = document.getElementById('timerWrapper');
  let dragY0 = null, dragMs0 = null;

  function isOnRing(e) {
    /* Check if pointer is within the thick ring zone */
    const rect = timerWrapper.getBoundingClientRect();
    const cx = rect.left + rect.width  / 2;
    const cy = rect.top  + rect.height / 2;
    const px = e.touches ? e.touches[0].clientX : e.clientX;
    const py = e.touches ? e.touches[0].clientY : e.clientY;
    const dist = Math.sqrt((px - cx) ** 2 + (py - cy) ** 2);
    /* Ring: radius 86 ± 10 in SVG units (210px wrapper → scale ≈ 1) */
    const scale = rect.width / 210;
    const rMin = (86 - 12) * scale;
    const rMax = (86 + 12) * scale;
    return dist >= rMin && dist <= rMax;
  }

  timerWrapper.addEventListener('mousedown', e => {
    if (!isOnRing(e)) return;
    dragY0  = e.clientY;
    dragMs0 = remainingMs;
    e.preventDefault();
  });

  timerWrapper.addEventListener('touchstart', e => {
    if (!isOnRing(e)) return;
    dragY0  = e.touches[0].clientY;
    dragMs0 = remainingMs;
    e.preventDefault();
  }, { passive: false });

  function onMove(clientY) {
    if (dragY0 === null) return;
    const dy    = dragY0 - clientY;        // up → positive → more time
    const delta = dy * 4000;               // 1 px = 4 seconds
    const newMs = Math.max(0, Math.min(99 * 60 * 1000, dragMs0 + delta));
    totalMs     = newMs;
    remainingMs = newMs;
    syncPresetButtons();
    render();
  }

  window.addEventListener('mousemove', e => onMove(e.clientY));
  window.addEventListener('touchmove', e => { e.preventDefault(); onMove(e.touches[0].clientY); }, { passive: false });

  function onEnd() { dragY0 = null; dragMs0 = null; }
  window.addEventListener('mouseup',  onEnd);
  window.addEventListener('touchend', onEnd);

  /* ─────────────────────────────────────────
     PRESET BUTTONS
  ───────────────────────────────────────── */
  function setTimer(ms) {
    if (isRunning) {
      isRunning = false;
      setPlayIcon(false);
      cancelAnimationFrame(raf);
    }
    totalMs     = ms;
    remainingMs = ms;
    lastTs      = null;
    render();
  }

  function syncPresetButtons() {
    const mins = Math.round(totalMs / 60000);
    document.querySelectorAll('.preset-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.minutes !== 'custom' && parseInt(b.dataset.minutes) === mins);
    });
  }

  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.minutes === 'custom') {
        openCustomSheet();
        return;
      }
      setTimer(parseInt(btn.dataset.minutes) * 60 * 1000);
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  /* ─────────────────────────────────────────
     CUSTOM TIME SHEET
  ───────────────────────────────────────── */
  const customOverlay = document.getElementById('customOverlay');

  function openCustomSheet() { customOverlay.classList.add('open'); }
  function closeCustomSheet() { customOverlay.classList.remove('open'); }

  document.getElementById('customCancel').addEventListener('click', closeCustomSheet);
  customOverlay.addEventListener('click', e => { if (e.target === customOverlay) closeCustomSheet(); });

  document.getElementById('customConfirm').addEventListener('click', () => {
    const m  = Math.max(0, parseInt(document.getElementById('customMin').value) || 0);
    const s  = Math.max(0, Math.min(59, parseInt(document.getElementById('customSec').value) || 0));
    const ms = (m * 60 + s) * 1000;
    if (ms > 0) {
      setTimer(ms);
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    }
    closeCustomSheet();
  });

  /* ─────────────────────────────────────────
     HISTORY (localStorage)
  ───────────────────────────────────────── */
  let sessions = [];
  try { sessions = JSON.parse(localStorage.getItem('catTimerSessions') || '[]'); } catch (_) {}

  function saveSession() {
    const elapsed = totalMs - remainingMs;
    if (elapsed < 10000) return;
    sessions.push({ date: new Date().toISOString(), duration: elapsed, target: totalMs });
    if (sessions.length > 200) sessions = sessions.slice(-200);
    try { localStorage.setItem('catTimerSessions', JSON.stringify(sessions)); } catch (_) {}
  }

  function fmtDur(ms) {
    const m = Math.floor(ms / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    if (m === 0) return `${s}초`;
    if (s === 0) return `${m}분`;
    return `${m}분 ${s}초`;
  }

  function renderHistory() {
    const statsEl = document.getElementById('historyStats');
    const listEl  = document.getElementById('historyList');

    if (sessions.length === 0) {
      statsEl.innerHTML = '';
      listEl.innerHTML  = '<div class="empty-history">아직 집중 기록이 없냥~<br>타이머를 시작해봐! 🐱</div>';
      return;
    }

    const totalFocus  = sessions.reduce((a, s) => a + s.duration, 0);
    const avgFocus    = totalFocus / sessions.length;
    const todaySess   = sessions.filter(s => new Date(s.date).toDateString() === new Date().toDateString());
    const todayTotal  = todaySess.reduce((a, s) => a + s.duration, 0);

    statsEl.innerHTML = `
      <div class="stats-title">집중 통계</div>
      <div class="stat-row">
        <div class="stat-card">
          <div class="stat-value">${fmtDur(avgFocus)}</div>
          <div class="stat-label">평균 집중 시간</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${fmtDur(todayTotal)}</div>
          <div class="stat-label">오늘 집중 시간</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${sessions.length}회</div>
          <div class="stat-label">총 세션</div>
        </div>
      </div>
    `;

    /* Group by date */
    const groups = {};
    [...sessions].reverse().forEach(s => {
      const d = new Date(s.date);
      const key = d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
      if (!groups[key]) groups[key] = [];
      groups[key].push(s);
    });

    listEl.innerHTML = Object.entries(groups).map(([date, items]) => `
      <div class="history-date-group">
        <div class="history-date">${date}</div>
        ${items.map(s => {
          const t = new Date(s.date);
          const timeStr = t.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
          return `
            <div class="history-item">
              <div class="history-item-left">
                <span class="history-time-label">${timeStr}</span>
                <span class="history-target">목표 ${fmtDur(s.target)}</span>
              </div>
              <span class="history-duration">${fmtDur(s.duration)}</span>
            </div>`;
        }).join('')}
      </div>
    `).join('');
  }

  document.getElementById('historyBtn').addEventListener('click', () => {
    renderHistory();
    document.getElementById('historyPanel').classList.add('open');
  });

  document.getElementById('closeHistoryBtn').addEventListener('click', () => {
    document.getElementById('historyPanel').classList.remove('open');
  });

  /* Save partial session on page unload */
  window.addEventListener('beforeunload', () => {
    if (isRunning && totalMs - remainingMs > 10000) saveSession();
  });
</script>
</body>
</html>
